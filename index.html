<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Emoto</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #000;
        overflow: hidden;
      }

      #mic-overlay {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        z-index: 10;
        background: rgba(0, 0, 0, 0.85);
        color: #fff;
        font-family: system-ui, sans-serif;
      }
      #mic-overlay.hidden {
        display: none;
      }
      #mic-overlay button {
        padding: 0.75rem 2rem;
        font-size: 1rem;
        border: 1px solid #fff;
        background: transparent;
        color: #fff;
        cursor: pointer;
        border-radius: 4px;
      }
      #mic-overlay button:hover {
        background: rgba(255, 255, 255, 0.1);
      }
      #mic-status {
        font-size: 0.875rem;
        opacity: 0.7;
        min-height: 1.2em;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="mic-overlay" role="dialog" aria-label="Microphone access">
      <button id="btn-begin" type="button">Begin</button>
      <button id="btn-watch" type="button" style="font-size: 0.85rem; opacity: 0.6">
        Watch only
      </button>
      <p id="mic-status"></p>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
