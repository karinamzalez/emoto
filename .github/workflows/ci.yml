name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the real branch head (not the merge commit) so we can push back
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        id: e2e
        run: npm run test:e2e
        continue-on-error: true

      # When E2E fails, regenerate snapshots on this platform (Linux) and commit them.
      # If the only failures were screenshot mismatches, the commit + re-verify step will pass.
      # If non-snapshot tests also fail, no snapshots change and the step exits non-zero,
      # which causes the job to fail correctly.
      - name: Regenerate snapshots on mismatch
        if: steps.e2e.outcome == 'failure'
        run: |
          npm run test:e2e -- --update-snapshots
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add -- tests/
          if git diff --cached --quiet; then
            echo "No snapshot changes — failures are not snapshot-related"
            exit 1
          fi
          git commit -m "chore(snapshots): update playwright baselines [skip ci]"
          git push

      - name: Verify E2E after snapshot update
        if: steps.e2e.outcome == 'failure'
        run: npm run test:e2e
